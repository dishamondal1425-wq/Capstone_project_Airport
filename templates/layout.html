<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width,
          initial-scale=1.0">

    <title>Air Notify</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet"
          href="{{ url_for('static',
          filename='style.css') }}">

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">

    <div class="container">

        <a class="navbar-brand fw-bold"
           href="/">

            ✈ Air Notify

        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">

            <span class="navbar-toggler-icon">
            </span>

        </button>

        <div class="collapse navbar-collapse"
             id="navbarNav">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link"
                       href="/">
                        Home
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       href="/about">
                        About
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       href="/announcement">
                        Announcement AI
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       href="/flight-status">
                        Flight Status
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       href="/food-order">
                        Food Order
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       href="/ticket-booking">
                        Ticket Booking
                    </a>
                </li>

            </ul>

        </div>

    </div>

</nav>


<!-- PAGE CONTENT -->

<div class="container mt-4">

    {% block content %}
    {% endblock %}

</div>


<!-- Bootstrap JS -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>

</body>
</html>
