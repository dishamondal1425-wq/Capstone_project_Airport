<!DOCTYPE html>
<html>
<head>
    <title>Air Notify</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            background-image:url("{{ url_for('static', filename='air_notify.png') }}");

            background-size:cover;
            background-position:center;
            background-repeat:no-repeat;

            height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            position:relative;
            overflow:hidden;
        }

        /* Dark overlay */

        body::before{
            content:"";
            position:absolute;
            top:0;
            left:0;

            width:100%;
            height:100%;

            background:rgba(0,0,0,0.25);
        }

        

        .full-page-link{
        position:absolute;
        top:0;
        left:0;

        width:100%;
        height:100%;

        display:flex;
        justify-content:center;
        align-items:center;

        text-decoration:none;
        z-index:20;
        }

        

        

    </style>

</head>

<body>

    <a href="/home" class="full-page-link"></a>

</body>
</html>
